{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}My Site{% endblock %}</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <link rel="stylesheet" href="{% static 'css/forms.css' %}" />
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}" />
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
  </head>
  <body>
    <div
      class="d-flex flex-column flex-shrink-0 p-3 bg-light"
      style="width: 200px; min-width: 200px; height: 100vh"
    >
      <a href="#" class="mb-3 me-md-auto"
        ><img src="{% static 'images/st_logo.png' %}" alt="Logo" class="logo" />
      </a>
      <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item">
          <a href="{% url 'kpi' %}" class="nav-link link-dark"> KPI</a>
        </li>
        <li class="nav-item">
          <a href="{% url 'account' %}" class="nav-link link-dark active">
            Accounts</a
          >
        </li>
      </ul>
    </div>

    <div class="main-content">
      {% load django_browser_reload %} {% block content %}
      <!-- Main content will be inserted here -->
      {% django_browser_reload_script %} {% endblock %}
    </div>
  </body>
</html>
